version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: vyapar-postgres-db
    environment:
      POSTGRES_DB: monopoly
      POSTGRES_USER: rajshaikh
      POSTGRES_PASSWORD: Sam@2445
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vyapar-backend
    ports:
      - "9090:9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/monopoly
      SPRING_DATASOURCE_USERNAME: rajshaikh
      SPRING_DATASOURCE_PASSWORD: Sam@2445
    depends_on:
      - postgres-db
    restart: unless-stopped

  frontend:
    build:
      context: ../vyapar-frontend
      dockerfile: Dockerfile
    container_name: vyapar-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
